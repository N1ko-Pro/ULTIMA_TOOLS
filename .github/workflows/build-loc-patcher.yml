name: Build MSCLoc API

# Builds the MSCLoader runtime translation patcher (MSCLoc API) and publishes
# MSCLocAPI.dll as a GitHub release asset of this repo (ULTIMA_TOOLS).
# The ULTIMA app downloads it on demand (see toolConfig.js in the app repo:
# Backend/games/mysummercar/toolConfig.js -> MSC_PATCHER.downloadUrl points here).
#
# Builds net35 via the Microsoft.NETFramework.ReferenceAssemblies NuGet package,
# so NO game files are needed — the three redistributable deps (MSCLoader,
# Harmony 1.2, Json.NET) are committed under MSCLocAPI/References/.
#
# Publish a new build by pushing a tag like `MSCLoc-API-v1.1.0` (must match
# MSC_PATCHER.version in the app's toolConfig.js). The newest tag becomes the
# repo's "Latest" release. The app resolves the highest MSCLoc-API-v* semver
# from the releases API on its own, so it isn't tied to this flag.

on:
  push:
    tags:
      - 'MSCLoc-API-v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  PROJECT_DIR: MSCLocAPI

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Test (pure core, net8)
        run: dotnet run -c Release --project "${{ env.PROJECT_DIR }}/tests/MSCLocAPI.Tests.csproj"

      - name: Build patcher (net35)
        run: dotnet build -c Release "${{ env.PROJECT_DIR }}/MSCLocAPI.csproj" -o publish

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: MSCLocAPI
          path: publish/MSCLocAPI.dll

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: publish/MSCLocAPI.dll
          # Mark the newest tag as the repo's "Latest" release so the Releases
          # page sorts/badges it correctly. The app no longer relies on GitHub's
          # "latest" for updates (it resolves the highest MSCLoc-API-v* semver
          # itself), so this is purely for a sane release page.
          prerelease: false
          make_latest: true

  # ── Publish to Nexus Mods (disabled until configured) ───────────────────────
  # Runs only when the repo variable NEXUSMODS_FILE_ID is set, so it never breaks
  # the build/release above. Uses the official Nexus Upload API action.
  #   One-time: create the mod page + upload the first MSCLocAPI.dll manually,
  #             copy its File ID.
  #   Variable: NEXUSMODS_FILE_ID = <that file id>
  #   Secret:   NEXUSMODS_API_KEY = <personal API key>
  publish-nexus:
    needs: build
    if: ${{ vars.NEXUSMODS_FILE_ID != '' && startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    steps:
      - name: Derive version from tag (MSCLoc-API-vX.Y.Z -> X.Y.Z)
        id: ver
        run: echo "version=${GITHUB_REF_NAME#MSCLoc-API-v}" >> "$GITHUB_OUTPUT"

      - name: Download built DLL
        uses: actions/download-artifact@v4
        with:
          name: MSCLocAPI
          path: ./artifact

      - name: Package as zip
        run: |
          mkdir -p out
          cp ./artifact/MSCLocAPI.dll out/
          cd out && zip "MSCLocAPI-${{ steps.ver.outputs.version }}.zip" MSCLocAPI.dll

      - name: Upload to Nexus Mods
        uses: Nexus-Mods/upload-action@main
        with:
          api_key: ${{ secrets.NEXUSMODS_API_KEY }}
          file_id: ${{ vars.NEXUSMODS_FILE_ID }}
          filename: out/MSCLocAPI-${{ steps.ver.outputs.version }}.zip
          display_name: MSCLoc API ${{ steps.ver.outputs.version }}
          description: Пожалуйста, ознакомьтесь с описанием, чтобы узнать больше деталей.
          version: ${{ steps.ver.outputs.version }}
